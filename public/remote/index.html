<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>BethPresenter Mobile</title>
  <script src="/socket.io/socket.io.js"></script>
  <style>
    :root {
      --bg-black: #050505;
      --surface-base: #121214;
      --surface-elevated: #1e1e20;
      --accent-teal: #00d2d2;
      --accent-blue: #3b82f6;
      --text-main: #ffffff;
      --text-muted: #8e8e93;
      --safety-area-inset-top: env(safe-area-inset-top);
      --safety-area-inset-bottom: env(safe-area-inset-bottom);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--bg-black);
      color: var(--text-main);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    button { border: none; outline: none; background: none; cursor: pointer; color: inherit; transition: opacity 0.2s; }
    button:active { opacity: 0.5; }

    /* --- PIN SCREEN --- */
    #auth-screen {
      position: fixed; inset: 0; z-index: 1000;
      background: var(--bg-black);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 40px; text-align: center;
    }
    .bp-logo { font-size: 48px; font-weight: 900; letter-spacing: -2px; color: var(--accent-blue); margin-bottom: 8px; }
    .pin-label { color: var(--text-muted); font-size: 14px; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 24px; }
    .pin-input {
      background: var(--surface-base); border: 2px solid var(--surface-elevated);
      width: 100%; max-width: 250px;
      height: 60px; border-radius: 16px;
      text-align: center; font-size: 32px; font-weight: 900; letter-spacing: 8px;
      color: var(--text-main); outline: none;
    }
    .pin-input:focus { border-color: var(--accent-blue); }
    .connect-btn {
      margin-top: 24px; width: 100%; max-width: 250px;
      height: 56px; border-radius: 16px;
      background: var(--accent-blue); color: white;
      font-weight: 800; text-transform: uppercase; letter-spacing: 1px;
    }

    /* --- TOP BAR --- */
    header {
      padding: calc(16px + var(--safety-area-inset-top)) 20px 16px;
      background: var(--surface-base); border-bottom: 1px solid var(--surface-elevated);
      display: flex; justify-content: space-between; align-items: center;
    }
    .header-info h1 { font-size: 14px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; color: var(--accent-blue); }
    .header-info p { font-size: 11px; color: var(--text-muted); font-weight: 600; }
    .global-actions { display: flex; gap: 12px; }
    .action-btn { 
      width: 44px; height: 44px; border-radius: 12px; 
      background: var(--surface-elevated);
      display: flex; items-center; justify-content: center; font-size: 18px;
    }
    .action-btn.active { background: var(--accent-teal); color: black; }

    /* --- MAIN TABS --- */
    main { flex: 1; overflow: hidden; position: relative; }
    .tab-content {
      position: absolute; inset: 0;
      opacity: 0; pointer-events: none; transition: opacity 0.2s;
      overflow-y: auto; padding: 20px;
    }
    .tab-content.active { opacity: 1; pointer-events: auto; }

    /* FLOW TAB */
    .service-item {
      background: var(--surface-base); border: 1px solid var(--surface-elevated);
      border-radius: 16px; padding: 16px; margin-bottom: 12px;
      display: flex; align-items: center; gap: 12px;
    }
    .service-item.active { border-color: var(--accent-teal); background: rgba(0, 210, 210, 0.05); }
    .item-icon { width: 40px; height: 40px; border-radius: 10px; background: var(--surface-elevated); display: flex; align-items: center; justify-content: center; }
    .item-info { flex: 1; min-width: 0; }
    .item-info h2 { font-size: 13px; font-weight: 800; text-transform: uppercase; tracking: -0.2px; margin-bottom: 2px; }
    .item-info p { font-size: 11px; color: var(--text-muted); }

    /* LYRICS TAB */
    .slides-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .slide-card {
      background: var(--surface-base); border: 2px solid var(--surface-elevated);
      border-radius: 14px; padding: 20px 12px;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      text-align: center; min-height: 120px;
    }
    .slide-card.active { border-color: #10b981; background: rgba(16, 185, 129, 0.1); }
    .slide-label { font-size: 8px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
    .slide-text { font-size: 13px; font-weight: 700; line-height: 1.4; color: white; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }

    /* BIBLE TAB */
    .search-row { display: flex; gap: 10px; margin-bottom: 20px; }
    .bible-in { flex: 1; height: 50px; background: var(--surface-base); border: 1px solid var(--surface-elevated); border-radius: 12px; padding: 0 16px; color: white; outline: none; }
    .search-btn { background: var(--accent-blue); width: 50px; height: 50px; border-radius: 12px; display: flex; align-items: center; justify-content: center; }

    /* --- BOTTOM NAV --- */
    nav {
      background: var(--surface-base); border-top: 1px solid var(--surface-elevated);
      padding: 10px 20px calc(10px + var(--safety-area-inset-bottom));
      display: flex; justify-content: space-around;
    }
    .nav-tab { display: flex; flex-direction: column; align-items: center; gap: 4px; color: var(--text-muted); }
    .nav-tab.active { color: var(--accent-blue); }
    .nav-tab span { font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; }

  </style>
</head>
<body>

  <!-- AUTH SCREEN -->
  <div id="auth-screen">
    <div class="bp-logo">BETH</div>
    <div class="pin-label">Enter 6-Digit Secure PIN</div>
    <input type="number" id="pin-field" class="pin-input" placeholder="000000" maxlength="6">
    <button class="connect-btn" onclick="connectRemote()">Connect Now</button>
  </div>

  <header id="main-header" style="display: none;">
    <div class="header-info">
      <h1 id="host-name">Presenter Remote</h1>
      <p id="curr-item-name">Ready for production</p>
    </div>
    <div class="global-actions">
      <button id="blank-btn" class="action-btn" onclick="sendAction('TOGGLE_BLANK')">⬛</button>
      <button class="action-btn" onclick="sendAction('PREV_SLIDE')">◀</button>
      <button class="action-btn" onclick="sendAction('NEXT_SLIDE')">▶</button>
    </div>
  </header>

  <main>
    <div id="tab-flow" class="tab-content active">
       <div id="flow-list"></div>
    </div>
    <div id="tab-lyrics" class="tab-content">
       <div class="pin-label" style="margin-bottom: 12px;">Active Slide Control</div>
       <div id="slides-grid" class="slides-grid"></div>
    </div>
    <div id="tab-bible" class="tab-content">
       <div class="search-row">
         <input type="text" id="bible-search" class="bible-in" placeholder="E.g. John 3:16 or Keywords">
         <button class="search-btn" onclick="searchBible()">🔍</button>
       </div>
       <div id="bible-results"></div>
    </div>
  </main>

  <nav id="main-nav" style="display: none;">
    <button class="nav-tab active" onclick="showTab('flow')"><span>Flow</span></button>
    <button class="nav-tab" onclick="showTab('lyrics')"><span>Lyrics</span></button>
    <button class="nav-tab" onclick="showTab('bible')"><span>Bible</span></button>
  </nav>

  <script>
    let socket;
    let state = { currentIndex: -1, activeItemIndex: -1, isBlank: false, serviceItems: [], slides: [] };

    function connectRemote() {
      const pin = document.getElementById('pin-field').value;
      if (pin.length < 6) return alert('Enter full PIN');
      socket = io();
      socket.on('connect', () => socket.emit('join-remote', pin));
      socket.on('auth-success', () => {
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('main-header').style.display = 'flex';
        document.getElementById('main-nav').style.display = 'flex';
      });
      socket.on('auth-failure', (err) => { alert(err.message); socket.disconnect(); });
      socket.on('state-update', (updated) => { state = { ...state, ...updated }; renderAll(); });
      socket.on('bible-results', renderBibleResults);
    }

    function showTab(id) {
      document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
      document.getElementById('tab-' + id).classList.add('active');
      const tabs = Array.from(document.querySelectorAll('.nav-tab'));
      const activeTab = tabs.find(t => t.innerText.toLowerCase().includes(id));
      if (activeTab) activeTab.classList.add('active');
    }

    function sendAction(action, payload) {
       if (socket) socket.emit('control-action', { action, payload });
       if (navigator.vibrate) navigator.vibrate(40);
    }

    function renderAll() {
       const blankBtn = document.getElementById('blank-btn');
       if (state.isBlank) blankBtn.classList.add('active');
       else blankBtn.classList.remove('active');
       const currentItem = state.serviceItems?.[state.activeItemIndex];
       document.getElementById('curr-item-name').textContent = currentItem ? currentItem.title : 'Ready for production';
       const flowList = document.getElementById('flow-list');
       flowList.innerHTML = (state.serviceItems || []).map((item, idx) => `
         <div class="service-item ${idx === state.activeItemIndex ? 'active' : ''}" onclick="sendAction('JUMP_TO', { itemIndex: ${idx}, slideIndex: 0 })">
           <div class="item-icon">${item.type === 'song' ? '🎵' : '📖'}</div>
           <div class="item-info"><h2>${item.title}</h2><p>${item.slides || 1} slides</p></div>
         </div>
       `).join('');
       const grid = document.getElementById('slides-grid');
       if (state.slides && state.slides.length > 0) {
         grid.innerHTML = state.slides.map((sl, idx) => `
           <div class="slide-card ${idx === state.currentIndex ? 'active' : ''}" onclick="sendAction('JUMP_TO', { itemIndex: ${state.activeItemIndex}, slideIndex: ${idx} })">
             <div class="slide-label">${sl.label || 'Slide ' + (idx + 1)}</div>
             <div class="slide-text">${sl.text}</div>
           </div>
         `).join('');
       } else {
         grid.innerHTML = '<div class="pin-label" style="grid-column: span 2; padding: 40px;">Select an item to see slides</div>';
       }
    }

    function searchBible() {
       const query = document.getElementById('bible-search').value;
       if (!query) return;
       document.getElementById('bible-results').innerHTML = '<div class="pin-label" style="text-align:center; padding: 40px;">Searching Host...</div>';
       sendAction('BIBLE_SEARCH', query);
    }

    function renderBibleResults(results) {
       const cont = document.getElementById('bible-results');
       if (!results || results.length === 0) { cont.innerHTML = '<div class="pin-label" style="text-align:center; padding: 40px;">No verses found</div>'; return; }
       cont.innerHTML = results.map(res => `
         <div class="service-item" style="flex-direction: column; align-items: flex-start; gap: 8px;">
            <div style="font-size: 13px; font-weight: 800; color: var(--accent-teal);">${res.reference}</div>
            <p style="font-size: 11px; line-height: 1.4; color: white;">${res.text}</p>
            <button onclick='sendAction("SEND_BIBLE", ${JSON.stringify(res)})' style="margin-top: 10px; width: 100%; height: 36px; border-radius: 8px; background: var(--accent-blue); color: white; font-size: 11px; font-weight: 800;">SEND TO OUTPUT</button>
         </div>
       `).join('');
    }
  </script>
</body>
</html>
